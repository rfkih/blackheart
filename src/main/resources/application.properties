# Application Name
spring.application.name=blackheart

# Default active profile. Local / IDE runs get `dev` for ergonomics.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trading_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway — version-controlled DB migrations.
#
# baseline-on-migrate=true  → on first run against an existing DB (no
#   flyway_schema_history table), Flyway stamps the schema as V1 instead
#   of trying to apply earlier migrations. Existing prod schemas — already
#   built up via the manual db/migration/*.sql files — are accepted as-is.
# baseline-version=1        → the version recorded for that baseline
#   stamp. Future migrations live as V2__*.sql, V3__*.sql, etc.
# locations=db/flyway       → versioned migrations go HERE. The legacy
#   db/migration/ folder is kept as reference but Flyway doesn't touch it.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/flyway
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Batch writes — without these, every saveAll() falls back to N single INSERTs.
# The backfill + backtest persistence paths save thousands of rows at a time.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.httpclient5.enabled=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Graceful shutdown — on SIGTERM, stop accepting new HTTP requests but let
# in-flight ones (live order RPC, backtest submit) complete up to the timeout.
# Without this, a `systemctl restart blackheart-trading` mid-order can orphan
# a Binance order whose response we never read. 30s covers the slow-path of a
# market-order place + fill confirmation under typical Binance latency.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

# CORS allow-list — comma-separated. Dev default keeps `next dev` on :3000
# working; production deploys MUST override (e.g. CORS_ALLOWED_ORIGINS=https://app.example.com).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Human-readable build version stamped on each backtest_run for the
# reproducibility manifest. CI sets APP_VERSION (e.g. semver / build number);
# local dev falls through to the literal "dev". Pair with GIT_COMMIT.
app.version=${APP_VERSION:dev}


# Redis connection settings
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=5000ms
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10


# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=all

# Backtest queue settings. Consumer is research-JVM only (@Profile("research")).
# Limits control how many PENDING+RUNNING runs a user may have simultaneously.
app.backtest.kafka.topic=${BACKTEST_KAFKA_TOPIC:backtest-requests}
app.backtest.consumer-concurrency=${BACKTEST_CONSUMER_CONCURRENCY:3}
app.backtest.limit.regular-user=${BACKTEST_LIMIT_REGULAR_USER:1}
app.backtest.limit.research-agent=${BACKTEST_LIMIT_RESEARCH_AGENT:3}

fastapi.base-url=${FASTAPI_URL:http://127.0.0.1:8000}
nodejs.api.base-url=${NODEJS_URL:https://entertainment-places-thesaurus-lib.trycloudflare.com}

app.ws.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Auth cookie attributes. `secure=false` disables the Secure flag so the cookie
# works over plain HTTP in local dev; ALWAYS set COOKIE_SECURE=true in any env
# that terminates HTTPS.
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.samesite=${COOKIE_SAMESITE:Lax}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.ids=${TELEGRAM_CHAT_IDS:}
telegram.bot.query.key=${TELEGRAM_BOT_QUERY_KEY:myip}
telegram.bot.poll.interval-ms=${TELEGRAM_BOT_POLL_INTERVAL_MS:5000}

# HikariCP Configuration (Connection Pool)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:30}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECT_TIMEOUT_MS:15000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.leak-detection-threshold=${DB_POOL_LEAK_THRESHOLD_MS:0}
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1



spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktaW5zZWN1cmUta2V5LWNoYW5nZS1tZS12aWEtSldUX1NFQ1JFVC1lbnY=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:9000000}

# SMTP (Mailtrap sandbox by default — landed in Mailtrap's web inbox, not real recipients).
# Sandbox ("Email Testing"): host=sandbox.smtp.mailtrap.io, port=2525, user/pass per-inbox.
#   Find the SMTP credentials in Mailtrap → Email Testing → Inboxes → <inbox> → SMTP Settings.
# Live ("Email Sending"): host=live.smtp.mailtrap.io, port=587, user=api, pass=<API token>;
#   requires a verified sending domain before any send is accepted.
# MAIL_PASSWORD MUST come from the env in any shared environment — never commit it.
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# 5s connect / 10s send — keeps the request thread from blocking on a wedged SMTP server.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Sender identity used by EmailService. Sandbox accepts any From; live
# requires a verified sending domain in Mailtrap's "Email Sending" tab.
app.mail.from=${MAIL_FROM:noreply@meridian-edge.com}
app.mail.from-name=${MAIL_FROM_NAME:Meridian Edge}
# Soft-disable: when false, EmailService skips the SMTP call and just falls
# back to the WARN-log path. Lets dev / CI run without SMTP creds.
app.mail.enabled=${MAIL_ENABLED:true}

# ── Operational alerts (Phase 7.1 — AlertService) ────────────────────────────
# AlertService.raise() is the single entry point for system-actor alerts.
# Every call writes one alert_event row regardless of dedup; outbound fan-out
# is gated by these flags. WARN/CRITICAL go to Telegram + email; INFO is
# off by default (set telegram.info-enabled=true to make it heartbeat-style).
app.alerts.telegram.enabled=${ALERTS_TELEGRAM_ENABLED:true}
app.alerts.telegram.info-enabled=${ALERTS_TELEGRAM_INFO_ENABLED:false}
app.alerts.email.enabled=${ALERTS_EMAIL_ENABLED:false}
# Comma-separated recipient list. Required when alerts.email.enabled=true.
app.alerts.email.to=${ALERTS_EMAIL_TO:}
app.alerts.email.from=${ALERTS_EMAIL_FROM:${app.mail.from}}
app.alerts.email.from-name=${ALERTS_EMAIL_FROM_NAME:Blackheart Ops}
# Suppress repeated outbound sends for the same dedupe_key within this window.
# The persisted row is still written with suppressed=true so the flap rate
# remains observable in alert_event.
app.alerts.dedup.ttl-minutes=${ALERTS_DEDUP_TTL_MINUTES:60}

# ── Liveness watchdog (Phase 7.3 — LivenessWatchdogService) ─────────────────
# Trading-JVM-only (@Profile("!research")) 5-minute sweep that checks for
# scheduler dead-mans, stuck trades, and stalled ingest. Each detection raises
# an AlertService.raise call with a stable dedupe key so a sustained outage
# logs once per dedup TTL window, not every 5 minutes.
app.watchdog.enabled=${WATCHDOG_ENABLED:true}
app.watchdog.interval-ms=${WATCHDOG_INTERVAL_MS:300000}
app.watchdog.initial-delay-ms=${WATCHDOG_INITIAL_DELAY_MS:60000}
# Grace beyond a job's expected next-fire-after-last-run before declaring it dead.
app.watchdog.scheduler-grace-minutes=${WATCHDOG_SCHEDULER_GRACE_MINUTES:10}
# A non-CLOSED parent Trades older than this is flagged.
app.watchdog.trade-stuck-hours=${WATCHDOG_TRADE_STUCK_HOURS:24}
# Newest market_data row for the live symbol must be no older than this.
app.watchdog.ingest-stalled-minutes=${WATCHDOG_INGEST_STALLED_MINUTES:15}
# Comma-separated intervals to monitor — defaults to the live WebSocket cadence.
app.watchdog.ingest-intervals=${WATCHDOG_INGEST_INTERVALS:5m}

# ── Nightly P&L deviation alert (Phase 7.4 — PnlDeviationAlertService) ─────
# For every PROMOTED account_strategy (enabled AND not simulated), z-score
# the trailing recent-days realized return sum against the strategy's own
# trailing lookback-days daily-return baseline. Alert at |z| >= z-threshold.
# Fires once per day; the curve generator runs at midnight UTC, so this
# defaults to 01:30 UTC to give the curve writer headroom.
app.alerts.pnl-deviation.enabled=${ALERTS_PNL_DEVIATION_ENABLED:true}
app.alerts.pnl-deviation.cron=${ALERTS_PNL_DEVIATION_CRON:0 30 1 * * *}
app.alerts.pnl-deviation.lookback-days=${ALERTS_PNL_DEVIATION_LOOKBACK_DAYS:90}
app.alerts.pnl-deviation.recent-days=${ALERTS_PNL_DEVIATION_RECENT_DAYS:7}
app.alerts.pnl-deviation.z-threshold=${ALERTS_PNL_DEVIATION_Z_THRESHOLD:2.0}
# Skip the check until the strategy has at least this many baseline days of
# realized history — guards against false positives on freshly promoted rows.
app.alerts.pnl-deviation.min-baseline-days=${ALERTS_PNL_DEVIATION_MIN_BASELINE_DAYS:30}

# Phase 7.5 — PROMOTED verdict drift cron. Calls the research orchestrator's
# /verdict-drift/scan endpoint nightly and raises VERDICT_DRIFT alerts for
# strategies whose latest cross_window_run verdict has dropped below the prior
# baseline. 02:30 UTC default — after the 01:30 UTC P&L deviation scan.
app.alerts.verdict-drift.enabled=${ALERTS_VERDICT_DRIFT_ENABLED:true}
app.alerts.verdict-drift.cron=${ALERTS_VERDICT_DRIFT_CRON:0 30 2 * * *}
app.alerts.verdict-drift.timeout-seconds=${ALERTS_VERDICT_DRIFT_TIMEOUT_SECONDS:60}

# Parametric engine (spec-driven strategies, M1-M4 of PARAMETRIC_ENGINE_BLUEPRINT).
# When true, StrategyExecutorFactory routes any strategy_definition row whose
# archetype != 'LEGACY_JAVA' through SpecDrivenExecutorAdapter built from
# spec_jsonb at runtime. When false, only the hand-coded legacy switch fires;
# spec-driven strategy_definition rows return 500 on backtest submit because
# nothing maps the strategy_code to an executor. M4 ships with this on by
# default; flip to false only to roll back to the pre-M1 routing.
blackheart.engine.parametric.enabled=${BLACKHEART_ENGINE_PARAMETRIC_ENABLED:true}

# Postgres LISTEN/NOTIFY hot-reload of cached spec executors. Trading JVM only
# (SpecChangeListener is @Profile("!research")). When true, a strategy_definition
# spec_jsonb mutation invalidates the in-memory SpecDrivenExecutorAdapter so the
# next tick rebuilds from the freshly-saved spec; when false, an operator
# restart is required to pick up edits. Default off — opt in per environment.
engine.spec.hot-reload.enabled=${ENGINE_SPEC_HOT_RELOAD_ENABLED:false}

# Engine-error rolling-window kill switch. EngineMetrics trips
# account_strategy.is_kill_switch_tripped when error-threshold or more
# spec evaluations fail within error-window-minutes for a given accountStrategyId.
engine.kill-switch.error-threshold=${ENGINE_KILL_SWITCH_ERROR_THRESHOLD:5}
engine.kill-switch.error-window-minutes=${ENGINE_KILL_SWITCH_ERROR_WINDOW_MINUTES:10}

# Data-at-rest encryption key (AES-256-GCM) for sensitive columns (Binance apiKey/apiSecret).
# MUST be a base64-encoded 32-byte key. Generate with:
#   openssl rand -base64 32
# The default is a dev-only sentinel. EncryptionKeyInitializer refuses to boot with it
# under prod/staging profiles.
app.encryption.key=${DB_ENCRYPTION_KEY:ZGV2b25seTMyYnl0ZWRhdGFjcnlwdG9rZXlwbGVhc2U=}

# Live trading symbol. Single-symbol today; pulled out of code so the WS
# subscription, balance lookup, and log messages all derive from one config
# key. Multi-symbol routing is a separate change to BinanceWebSocketClient.
app.live.symbol=${LIVE_SYMBOL:BTCUSDT}

# Spring Boot Actuator — operations telemetry consumed by the frontend
# /research dashboard. Both JVMs share this config. Endpoints are gated
# behind hasRole('ADMIN') in SecurityConfig — never expose publicly.
# `health` returns a top-level status summary; `metrics` lists names; the
# frontend reads `/actuator/metrics/{name}` per-name to keep payloads small.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Liveness/readiness probe sub-paths (/actuator/health/{liveness,readiness}).
# Whitelisted unauthenticated in SecurityConfig so k8s probes / uptime monitors
# can hit them without an admin session. They expose only status, not the
# component tree — safe to be public.
management.endpoint.health.probes.enabled=true
management.metrics.distribution.percentiles.jvm.gc.pause=0.5,0.95,0.99
management.info.git.mode=simple

# Research-JVM reverse proxy (V14, 2026-04-30).
# ResearchProxyController on the trading JVM forwards
# /api/v1/{backtest,research,montecarlo,historical}/** and
# /research-actuator/** to this URL. The research JVM binds to 127.0.0.1
# (see application-research.properties) so the only network-reachable port
# in the deployment is 8080. A single auth perimeter, single CORS config.
app.research.base-url=${RESEARCH_BASE_URL:http://127.0.0.1:8081}

# Research orchestrator (FastAPI on 127.0.0.1:8082) — proxied via
# ResearchOrchestratorProxyController on /api/v1/research-orch/**. Token is
# injected server-side; never relayed from the browser. Override
# RESEARCH_ORCH_TOKEN in prod and rotate alongside the orchestrator's
# ORCH_AUTH_TOKEN.
app.research.orchestrator.base-url=${RESEARCH_ORCH_BASE_URL:http://127.0.0.1:8082}
app.research.orchestrator.token=${RESEARCH_ORCH_TOKEN:dev-sentinel-not-for-prod}

# JVM identity stamped on every error_log row — distinguishes events from
# the trading vs research JVM in the developer-agent triage queue. Override
# in application-research.properties so the research JVM stamps "research".
blackheart.jvm.name=${BLACKHEART_JVM_NAME:trading}

# ── Resilience4j circuit breakers ────────────────────────────────────────────
# binance — wraps getCurrentBtcPrice() and getLatestPrices(). Trips after 50%
# failure rate over 10 calls, waits 30s before probing again.
resilience4j.circuitbreaker.instances.binance.sliding-window-size=10
resilience4j.circuitbreaker.instances.binance.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.binance.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.binance.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.binance.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.binance.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.binance.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.binance.register-health-indicator=true
# Exclude CB state from the aggregate /actuator/health status — a tripped
# circuit breaker is an operational event, not a JVM-down condition. The CB
# metrics are still visible via /actuator/metrics/resilience4j.circuitbreaker.*.
management.health.circuitbreakers.enabled=false
# Mail health indicator opens a TCP connection to the SMTP host to verify
# reachability. Sandbox SMTP (Mailtrap) can time out in dev → 503.
management.health.mail.enabled=false
