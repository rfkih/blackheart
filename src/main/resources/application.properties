# Application Name
spring.application.name=blackheart

# Default active profile. Local / IDE runs get `dev` for ergonomics.
# Production deployments MUST override with SPRING_PROFILES_ACTIVE=prod (or
# similar) AND supply a real JWT_SECRET + DB_ENCRYPTION_KEY — the sentinel
# checks in JwtService / EncryptionKeyInitializer refuse to boot if a prod-like
# profile is paired with the dev-default keys.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trading_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
#
# WARNING: `ddl-auto=update` is unsafe in production — a stray @Column change
# will silently mutate the live schema on startup. Keep as `update` in dev, but
# set `SPRING_JPA_HIBERNATE_DDL_AUTO=validate` in staging/prod and manage real
# migrations via Flyway/Liquibase. The env override keeps prod from sharing the
# dev default.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Batch writes — without these, every saveAll() falls back to N single INSERTs.
# The backfill + backtest persistence paths save thousands of rows at a time.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.httpclient5.enabled=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Redis connection settings
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=5000ms
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10


fastapi.base-url=${FASTAPI_URL:http://127.0.0.1:8000}
nodejs.api.base-url=${NODEJS_URL:http://localhost:8088}

app.ws.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:3000}

# Auth cookie attributes. `secure=false` disables the Secure flag so the cookie
# works over plain HTTP in local dev; ALWAYS set COOKIE_SECURE=true in any env
# that terminates HTTPS.
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.samesite=${COOKIE_SAMESITE:Lax}

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.ids=${TELEGRAM_CHAT_IDS:}
telegram.bot.query.key=${TELEGRAM_BOT_QUERY_KEY:myip}
telegram.bot.poll.interval-ms=${TELEGRAM_BOT_POLL_INTERVAL_MS:5000}

# HikariCP Configuration (Connection Pool)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1



spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# JWT Configuration
# Secret MUST be a Base64-encoded key of at least 256 bits (32 bytes).
# Generate a production key with:
#   openssl rand -base64 64
# The default below is an OBVIOUSLY-INSECURE dev-only key and is known to every
# reader of this repo — JwtService fails fast on startup if this exact value
# leaks into any non-dev profile. Always set JWT_SECRET via env in staging/prod.
app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktaW5zZWN1cmUta2V5LWNoYW5nZS1tZS12aWEtSldUX1NFQ1JFVC1lbnY=}
# Access-token lifetime: 15 min (900000 ms). Short-lived tokens reduce theft window.
# Override via JWT_EXPIRATION_MS.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# Data-at-rest encryption key (AES-256-GCM) for sensitive columns (Binance apiKey/apiSecret).
# MUST be a base64-encoded 32-byte key. Generate with:
#   openssl rand -base64 32
# The default is a dev-only sentinel. EncryptionKeyInitializer refuses to boot with it
# under prod/staging profiles.
app.encryption.key=${DB_ENCRYPTION_KEY:ZGV2b25seTMyYnl0ZWRhdGFjcnlwdG9rZXlwbGVhc2U=}
