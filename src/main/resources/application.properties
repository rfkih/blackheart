# Application Name
spring.application.name=blackheart

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trading_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
#
# WARNING: `ddl-auto=update` is unsafe in production — a stray @Column change
# will silently mutate the live schema on startup. Keep as `update` in dev, but
# set `SPRING_JPA_HIBERNATE_DDL_AUTO=validate` in staging/prod and manage real
# migrations via Flyway/Liquibase. The env override keeps prod from sharing the
# dev default.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Batch writes — without these, every saveAll() falls back to N single INSERTs.
# The backfill + backtest persistence paths save thousands of rows at a time.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.httpclient5.enabled=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Redis connection settings
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=5000ms
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10


fastapi.base-url=${FASTAPI_URL:http://127.0.0.1:8000}
nodejs.api.base-url=${NODEJS_URL:http://localhost:8088}

# WebSocket CORS origins — comma-separated. Must include every frontend origin
# that will open a STOMP connection. Locked down in prod; leave the localhost
# default for dev.
app.ws.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:3000}

# Telegram Bot Configuration
# No default value for the bot token — if TELEGRAM_BOT_TOKEN is unset the bot
# stays disabled at the service layer instead of posting to a leaked default.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.ids=${TELEGRAM_CHAT_IDS:}
telegram.bot.query.key=${TELEGRAM_BOT_QUERY_KEY:myip}
telegram.bot.poll.interval-ms=${TELEGRAM_BOT_POLL_INTERVAL_MS:5000}

# HikariCP Configuration (Connection Pool)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1



spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# JWT Configuration
# Secret MUST be a Base64-encoded key of at least 256 bits (32 bytes).
# Generate a production key with:
#   openssl rand -base64 64
# The default below is an OBVIOUSLY-INSECURE dev-only key and is known to every
# reader of this repo — JwtService fails fast on startup if this exact value
# leaks into any non-dev profile. Always set JWT_SECRET via env in staging/prod.
app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktaW5zZWN1cmUta2V5LWNoYW5nZS1tZS12aWEtSldUX1NFQ1JFVC1lbnY=}
# Token lifetime: 24 h (86400000 ms). Override via JWT_EXPIRATION_MS.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
