# Application Name
spring.application.name=blackheart

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trading_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.httpclient5.enabled=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Redis connection settings
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=5000ms
spring.redis.jedis.pool.max-active=100
spring.redis.jedis.pool.max-idle=50
spring.redis.jedis.pool.min-idle=10


fastapi.base-url=${FASTAPI_URL:http://127.0.0.1:8000}
nodejs.api.base-url=${NODEJS_URL:http://localhost:3000}

# Telegram Bot Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:8649672978:AAE0xfJqMqV-dafLurtEjhX7YtbkrHGTPc8}
telegram.chat.ids=${TELEGRAM_CHAT_IDS:1089479092}
telegram.bot.query.key=${TELEGRAM_BOT_QUERY_KEY:myip}
telegram.bot.poll.interval-ms=${TELEGRAM_BOT_POLL_INTERVAL_MS:5000}

# HikariCP Configuration (Connection Pool)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1



spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# JWT Configuration
# Secret must be a Base64-encoded key of at least 256 bits (32 bytes).
# Generate a production key with:
#   openssl rand -base64 64
# NEVER commit the real value — inject via environment variable JWT_SECRET.
app.jwt.secret=${JWT_SECRET:YmxhY2toZWFydFBsYXRmb3JtU2VjcmV0S2V5Rm9ySldUQXV0aDIwMjZDaGFuZ2VNZUluUHJvZA==}
# Token lifetime: 24 h (86400000 ms). Override via JWT_EXPIRATION_MS.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

