# Dev-profile-only overrides. Activated with SPRING_PROFILES_ACTIVE=dev.
#
# SECURITY: SQL + bind-parameter tracing is OFF by default even in dev.
# The bind trace writes every column value — passwords (pre-BCrypt),
# encrypted credentials (post-decryption in memory), UUIDs, PII — straight
# into the console and any log shipper attached to stdout. That's a data
# leak waiting to happen.
#
# If you genuinely need to diagnose an N+1 or a bad UPDATE, flip these on
# temporarily from the shell for a single run:
#
#   SPRING_JPA_SHOW_SQL=true \
#   LOGGING_LEVEL_ORG_HIBERNATE_SQL=DEBUG \
#   LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND=TRACE \
#   ./gradlew bootRun
#
# Do NOT commit those toggles back into this file.

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Statistics were previously enabled here; the per-session "Session Metrics"
# line flooded the console. Keep disabled unless actively profiling.
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=WARN
logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=WARN

# Quiet the routine framework chatter — keep WARN/ERROR as the signal floor.
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.apache.tomcat=WARN
logging.level.org.apache.catalina=WARN
logging.level.com.zaxxer.hikari=WARN

# Keep your own code at INFO so app-level audit events still show up.
logging.level.id.co.blackheart=INFO

# Route Binance WebSocket through the VPS proxy (blackheartjs) to bypass ISP block.
# Default (commented out) = connect directly to Binance.
# Uncomment and set to your VPS address when running locally with ISP restrictions.
app.live.binance-ws-base=wss://entertainment-places-thesaurus-lib.trycloudflare.com
