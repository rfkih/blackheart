# Dev-profile-only overrides. Activated with SPRING_PROFILES_ACTIVE=dev.
#
# Surfaces Hibernate SQL + bind parameters so N+1 patterns and rogue UPDATEs
# are visible during development. Do NOT enable these in production — the
# bind-parameter trace leaks column values into logs.

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Print SQL with readable formatting and statistics per request/boundary.
spring.jpa.properties.hibernate.generate_statistics=true
