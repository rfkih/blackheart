# application-research.properties — overrides for the research-isolated JVM.
#
# Activated by setting `spring.profiles.active=research` (typically
# alongside `dev` in development, e.g. `dev,research`). When this profile
# is active, beans annotated with @Profile("!research") do NOT register:
#
#   - BinanceWebSocketClient        (live tick feed)
#   - LivePnlPublisherService       (live P&L broadcast)
#   - SentimentPublisherService     (live sentiment broadcast)
#   - TelegramBotPollingService     (live notifications)
#   - SchedulerService              (DB-driven cron jobs)
#   - WebSocketRunner               (starts the Binance feed)
#   - SchedulerController           (depends on SchedulerService)
#   - SentimentWebSocketController  (depends on SentimentPublisherService)
#
# The result is a JVM that can submit backtests, run sweeps, query data,
# and serve research endpoints — but cannot place trades, broadcast live
# data, or interfere with the live-trading JVM running on port 8080.
#
# Operating model:
#   Trading JVM:  ./gradlew bootRun --args='--spring.profiles.active=dev'
#                 (port 8080, full live trading stack)
#
#   Research JVM: ./gradlew bootRun \
#                 --args='--spring.profiles.active=dev,research --server.port=8081'
#                 (port 8081, no live singletons, safe to restart freely)
#
# A research-side bug that crashes its JVM cannot crash the trading JVM.
# Memory limits set per-JVM via -Xmx isolate research from trading too.

# ── Port + bind address ──────────────────────────────────────────────────
# Override default 8080 so trading + research can coexist on the same host.
server.port=${RESEARCH_PORT:8081}
# Bind to loopback only — research is internal-only after V14
# (2026-04-30). The trading JVM's ResearchProxyController forwards
# /api/v1/{backtest,research,montecarlo,historical}/** and
# /research-actuator/** here. No direct browser traffic ever reaches this
# port. Override with RESEARCH_BIND_ADDRESS=0.0.0.0 only if running
# trading + research on different hosts (then put a firewall in front).
server.address=${RESEARCH_BIND_ADDRESS:127.0.0.1}

# ── Logging tag ──────────────────────────────────────────────────────────
# Make logs visually distinct so two parallel `tail -F` sessions don't
# get confused.
logging.pattern.console=%d{HH:mm:ss.SSS} [research] %-5level %logger{36} - %msg%n

# ── Database connection pool ─────────────────────────────────────────────
# Research workloads run heavy reads. Cap research's pool tighter than
# trading's so a runaway sweep can't starve the trading JVM of connections.
# (Both pools share the same Postgres backend until Step 5 adds a replica.)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}

# ── Flyway ───────────────────────────────────────────────────────────────
# Critical: research JVM should NOT run migrations. Trading JVM owns
# schema migrations; research only reads/writes data. Disable Flyway
# here to avoid two JVMs racing on flyway_schema_history.
spring.flyway.enabled=false

# ── Disable expensive initialization on research startup ─────────────────
# Research JVM doesn't need to seed strategy_definition, etc.
# Most of those run only on the trading-profile beans we've gated, but
# explicit is better than implicit.

# ── Kafka ────────────────────────────────────────────────────────────────
# Research JVM runs locally (not in Docker), so it reaches Kafka via the
# host-mapped external port 9094, not the internal Docker port 9092.
# Override KAFKA_BOOTSTRAP_SERVERS to point elsewhere (e.g. kafka:9092
# when research runs inside Docker too).
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

# ── Cache ────────────────────────────────────────────────────────────────
# Research and trading share Redis; namespace research keys to avoid
# stomping live cache entries. Existing param caches use prefix-keyed
# entries already (lsr:params:, vcb:params:, vbo:params:) so this is
# defense-in-depth for any future cache additions.
spring.cache.type=${RESEARCH_CACHE_TYPE:none}

# ── Operator-triggered shutdown (research-only) ──────────────────────────
# Enables POST /actuator/shutdown for graceful stop of the research JVM.
# The trading JVM proxies the inbound admin cookie when the operator
# clicks "Restart" / "Stop research" on the /research dashboard.
# NEVER enable this on the trading JVM — a misfire would halt live trading.
management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus,shutdown

# Stamp error_log rows from this JVM as `research` so the developer agent can
# triage by source.
blackheart.jvm.name=${BLACKHEART_JVM_NAME:research}
